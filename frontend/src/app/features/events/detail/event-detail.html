<div class="event-detail-page">
  <button mat-button class="back-btn" type="button" (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
    Back to Events
  </button>

  <ng-container *ngIf="loading; else detailContent">
    <section class="skeleton-shell">
      <div class="skeleton hero-skeleton"></div>

      <div class="detail-grid">
        <div class="main-column">
          <div class="skeleton card-skeleton tall"></div>
          <div class="skeleton card-skeleton"></div>
          <div class="skeleton card-skeleton"></div>
        </div>

        <div class="sidebar-column">
          <div class="skeleton card-skeleton"></div>
          <div class="skeleton card-skeleton"></div>
          <div class="skeleton card-skeleton tall"></div>
        </div>
      </div>
    </section>
  </ng-container>

  <ng-template #detailContent>
    <div class="detail-content" *ngIf="event && pricing && availability">
      <app-event-hero
        [event]="event"
        [imageUrl]="heroImage"
        (share)="shareEvent()"
        (expandImage)="openImageViewer(heroImage)"
      />

      <div class="detail-grid">
        <div class="main-column">
          <app-event-info-section
            [description]="event.description"
            [gallery]="galleryImages"
            (imageExpanded)="openImageViewer($event)"
          />
        </div>

        <div class="sidebar-column">
          <app-event-sidebar
            [event]="event"
            [venue]="venue"
            [pricing]="pricing"
            [availability]="availability"
            [selectedTiers]="selectedTiers"
            [isHoldingTiers]="isHoldingTiers"
            [isLoggedIn]="isLoggedIn"
            [pulseData]="pulseData"
            (selectSeats)="goToSelectSeats()"
            (holdTickets)="holdGeneralAdmissionTickets()"
            (selectionChanged)="onTierSelectionChanged($event)"
          />
        </div>
      </div>
    </div>
  </ng-template>

  <div
    class="image-viewer"
    *ngIf="lightboxImage"
    (click)="closeImageViewer()"
    role="dialog"
    aria-modal="true"
    aria-label="Expanded event image"
  >
    <button mat-icon-button class="close-viewer" type="button" (click)="closeImageViewer(); $event.stopPropagation()">
      <mat-icon>close</mat-icon>
    </button>

    <img [src]="lightboxImage" alt="Expanded event image" (click)="$event.stopPropagation()" />
  </div>
</div>
