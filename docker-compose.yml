services:
  postgres:
    image: postgres:16-alpine
    container_name: grabapass-postgres
    environment:
      POSTGRES_DB: grabapass
      POSTGRES_USER: grabapass
      POSTGRES_PASSWORD: grabapass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grabapass-backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://grabapass:grabapass@postgres:5432/grabapass}
      JWT_SECRET: ${JWT_SECRET:-change-me-for-real-use}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      PORT: ${PORT:-3000}
      RAZORPAY_CHECKOUT_NAME: ${RAZORPAY_CHECKOUT_NAME:-GrabAPass}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grabapass-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"

volumes:
  postgres_data:
